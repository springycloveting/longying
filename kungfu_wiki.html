            text-align: center;

            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            color: #e94560;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .header .subtitle {
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box input {
            padding: 10px 15px;
            border: 2px solid #e94560;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 250px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.3);
        }

        .search-box input::placeholder {
            color: #888;
        }

        .attr-filter {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .attr-filter select {
            padding: 8px 12px;
            border: 1px solid #e94560;
            border-radius: 20px;
            background: rgba(30, 30, 50, 0.9);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .attr-filter select:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
        }

        .attr-filter select option {
            background: #1a1a2e;
            color: #fff;
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #e94560;
            border-radius: 20px;
            background: transparent;
            color: #e94560;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            background: rgba(233, 69, 96, 0.2);
        }

        .filter-btn.active {
            background: #e94560;
            color: #fff;
        }

        .stats {
            color: #888;
            font-size: 13px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .type-section {
            margin-bottom: 30px;
        }

        .type-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            background: linear-gradient(90deg, rgba(233, 69, 96, 0.3) 0%, transparent 100%);
            border-left: 4px solid #e94560;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s;
        }

        .type-header:hover {
            background: linear-gradient(90deg, rgba(233, 69, 96, 0.4) 0%, transparent 100%);
        }

        .type-header h2 {
            color: #e94560;
            font-size: 1.2rem;
        }

        .type-header .count {
            color: #888;
            font-size: 0.9rem;
        }

        .type-header .toggle {
            margin-left: auto;
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .type-header.collapsed .toggle {
            transform: rotate(-90deg);
        }

        .kungfu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
            padding: 15px 0;
        }

        .type-section.collapsed .kungfu-grid {
            display: none;
        }

        .kungfu-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(233, 69, 96, 0.2);
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s;
        }

        .kungfu-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(233, 69, 96, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.2);
        }

        .kungfu-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .kungfu-id {
            background: #e94560;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .kungfu-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
        }

        .kungfu-type {
            margin-left: auto;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
        }

        .kungfu-desc {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 12px;
            line-height: 1.4;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .kungfu-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-row {
            display: flex;
            gap: 8px;
            font-size: 0.85rem;
        }

        .info-label {
            color: #e94560;
            min-width: 70px;
            flex-shrink: 0;
        }

        .info-value {
            color: #ccc;
            flex-wrap: wrap;
        }

        .attr-tag {
            display: inline-block;
            background: rgba(233, 69, 96, 0.15);
            color: #e94560;
            padding: 1px 8px;
            border-radius: 10px;
            margin: 2px;
            font-size: 0.8rem;
        }

        .no-data {
            color: #666;
            font-style: italic;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 30px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .controls {
                flex-direction: column;
            }

            .search-box input {
                width: 100%;
            }

            .kungfu-grid {
                grid-template-columns: 1fr;
            }
        }

            width: 8px;

            background: rgba(0, 0, 0, 0.2);
        }

            background: #e94560;
            border-radius: 4px;
        }

            background: #ff6b8a;

        // 类型顺序
        const typeOrder = ['内功', '轻功', '绝技', '拳掌', '剑法', '刀法', '长兵', '奇门', '射术'];

        // 类型颜色
        const typeColors = {
            '内功': '#ff6b6b',
            '轻功': '#4ecdc4',
            '绝技': '#ffe66d',
            '拳掌': '#95e1d3',
            '剑法': '#a8e6cf',
            '刀法': '#dcd6f7',
            '长兵': '#f4a261',
            '奇门': '#e9c46a',
            '射术': '#2a9d8f'
        };

        // 当前筛选状态
        let currentFilter = 'all';
        let currentSearch = '';
        let currentAttrFilter = '';
        let currentAttrField = 'all';
        let currentLevelFilter = '';

        // 所有属性名称列表
        const allAttrNames = getUniqueAttrNames();

        // 获取所有唯一属性名称
        function getUniqueAttrNames() {
            const names = new Set();
            kungfuData.forEach(k => {
                k.attrs.forEach(a => {
                    const name = a.replace(/[\d.]+$/, '').replace(/[\d.]+$/, '');
                    const match = a.match(/^([^\d]+)/);
                    if (match) names.add(match[1]);
                });
                k.damageBonus.forEach(a => {
                    const match = a.match(/^([^\d]+)/);
                    if (match) names.add(match[1]);
                });
                k.upgradeEffect.forEach(a => {
                    const match = a.match(/^([^\d]+)/);
                    if (match) names.add(match[1]);
                });
            });
            return Array.from(names).sort();
        }

        // 初始化
        function init() {
            document.getElementById('totalCount').textContent = kungfuData.length;
            initAttrFilter();
            renderKungfuList();
            bindEvents();
        }

        // 初始化属性筛选下拉框
        function initAttrFilter() {
            const select = document.getElementById('attrFilter');
            allAttrNames.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                select.appendChild(option);
            });
        }

        // 绑定事件
        function bindEvents() {
            // 搜索
            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentSearch = e.target.value.trim().toLowerCase();
                renderKungfuList();
            });

            // 筛选按钮
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.type;
                    renderKungfuList();
                });
            });

            // 属性筛选
            document.getElementById('attrFilter').addEventListener('change', (e) => {
                currentAttrFilter = e.target.value;
                renderKungfuList();
            });

            // 字段筛选
            document.getElementById('attrFieldFilter').addEventListener('change', (e) => {
                currentAttrField = e.target.value;
                renderKungfuList();
            });

            // 品级筛选
            document.getElementById('levelFilter').addEventListener('change', (e) => {
                currentLevelFilter = e.target.value;
                renderKungfuList();
            });
        }

        // 检查武功是否包含指定属性
        function hasAttr(kungfu, attrName, field) {
            const checkField = (arr) => arr.some(a => a.includes(attrName));

            if (field === 'all') {
                return checkField(kungfu.attrs) || checkField(kungfu.damageBonus) || checkField(kungfu.upgradeEffect);
            } else if (field === 'attrs') {
                return checkField(kungfu.attrs);
            } else if (field === 'damageBonus') {
                return checkField(kungfu.damageBonus);
            } else if (field === 'upgradeEffect') {
                return checkField(kungfu.upgradeEffect);
            }
            return false;
        }

        // 渲染武功列表
        function renderKungfuList() {
            const container = document.getElementById('kungfuList');

            // 筛选数据
            let filteredData = kungfuData;

            // 按类型筛选
            if (currentFilter !== 'all') {
                filteredData = filteredData.filter(k => k.type === currentFilter);
            }

            // 按搜索词筛选
            if (currentSearch) {
                filteredData = filteredData.filter(k =>
                    k.name.toLowerCase().includes(currentSearch) ||
                    k.id.toString() === currentSearch
                );
            }

            // 按属性筛选
            if (currentAttrFilter) {
                filteredData = filteredData.filter(k => hasAttr(k, currentAttrFilter, currentAttrField));
            }

            // 按品级筛选
            if (currentLevelFilter !== '') {
                filteredData = filteredData.filter(k => k.level === parseInt(currentLevelFilter));
            }

            // 更新显示数量
            document.getElementById('showCount').textContent = filteredData.length;

            // 按类型分组
            const grouped = {};
            filteredData.forEach(k => {
                if (!grouped[k.type]) {
                    grouped[k.type] = [];
                }
                grouped[k.type].push(k);
            });

            // 按类型顺序排序并渲染
            let html = '';
            typeOrder.forEach(type => {
                if (grouped[type] && grouped[type].length > 0) {
                    html += renderTypeSection(type, grouped[type]);
                }
            });

            container.innerHTML = html;

            // 绑定折叠事件
            document.querySelectorAll('.type-header').forEach(header => {
                header.addEventListener('click', () => {
                    header.classList.toggle('collapsed');
                    header.parentElement.classList.toggle('collapsed');
                });
            });
        }

        // 渲染类型区块
        function renderTypeSection(type, kungfus) {
            const color = typeColors[type] || '#e94560';
            let html = `
                <div class="type-section">
                    <div class="type-header">
                        <h2>${type}</h2>
                        <span class="count">(${kungfus.length}种)</span>
                        <span class="toggle">▼</span>
                    </div>
                    <div class="kungfu-grid">
            `;

            kungfus.forEach(k => {
                html += renderKungfuCard(k, color);
            });

            html += `
                    </div>
                </div>
            `;

            return html;
        }

        // 伤害加成等级配置
        const damageLevels = {
            '1': { text: '中', color: '#4caf50' },      // 绿色
            '0.1': { text: '中', color: '#4caf50' },
            '2': { text: '上', color: '#2196f3' },      // 蓝色
            '0.2': { text: '上', color: '#2196f3' },
            '3': { text: '精', color: '#9c27b0' },      // 紫色
            '0.3': { text: '精', color: '#9c27b0' },
            '4': { text: '极', color: '#ff9800' },      // 橙色
            '0.4': { text: '极', color: '#ff9800' },
            '5': { text: '绝', color: '#f44336' },      // 大红色
            '0.5': { text: '绝', color: '#f44336' }
        };

        // 格式化属性（小数转百分比）
        function formatAttr(attr) {
            // 匹配属性名和数值，如 "眩晕0.08" 或 "生命上限20"
            const match = attr.match(/^(.+?)(\d+\.?\d*)$/);
            if (match) {
                const name = match[1];
                const value = parseFloat(match[2]);
                // 如果是小数（小于1），转换为百分比
                if (value < 1) {
                    const percent = Math.round(value * 100);
                    return `<span class="attr-tag">${name}${percent}%</span>`;
                }
            }
            // 原样显示
            return `<span class="attr-tag">${attr}</span>`;
        }

        // 格式化伤害加成属性
        function formatDamageAttr(attr) {
            // 匹配属性名和数值，如 "力道2" 或 "内力0.3"
            const match = attr.match(/^(.+?)(\d+\.?\d*)$/);
            if (match) {
                const name = match[1];
                const value = match[2];
                const level = damageLevels[value];
                if (level) {
                    return `<span class="attr-tag damage-tag" style="background: ${level.color}22; color: ${level.color}; border: 1px solid ${level.color}">${name}${level.text}</span>`;
                }
            }
            // 如果没有匹配到等级，原样显示
            return `<span class="attr-tag">${attr}</span>`;
        }

        // 格式化升级效果（带"潜力"的标橙色，不带的标绿色）
        function formatUpgradeAttr(attr) {
            if (attr.includes('潜力')) {
                return `<span class="attr-tag" style="background: #ff980022; color: #ff9800; border: 1px solid #ff9800">${attr}</span>`;
            } else {
                return `<span class="attr-tag" style="background: #4caf5022; color: #4caf50; border: 1px solid #4caf50">${attr}</span>`;
            }
        }

        // 渲染武功卡片
        function renderKungfuCard(kungfu, color) {
            const attrs = kungfu.attrs.length > 0
                ? kungfu.attrs.map(a => formatAttr(a)).join('')
                : '<span class="no-data">无</span>';

            const damageBonus = kungfu.damageBonus.length > 0
                ? kungfu.damageBonus.map(a => formatDamageAttr(a)).join('')
                : '<span class="no-data">无</span>';

            const stance = kungfu.stance || '<span class="no-data">无</span>';

            const upgradeEffect = kungfu.upgradeEffect.length > 0
                ? kungfu.upgradeEffect.map(a => formatUpgradeAttr(a)).join('')
                : '<span class="no-data">无</span>';

            return `
                <div class="kungfu-card">
                    <div class="kungfu-header">
                        <span class="kungfu-id">${kungfu.id}</span>
                        <span class="kungfu-name">${kungfu.name}</span>
                        <span class="kungfu-type" style="background: ${color}22; color: ${color}">${kungfu.type}</span>
                    </div>
                    <div class="kungfu-desc">${kungfu.desc || '暂无描述'}</div>
                    <div class="kungfu-info">
                        <div class="info-row">
                            <span class="info-label">属性:</span>
                            <span class="info-value">${attrs}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">伤害加成:</span>
                            <span class="info-value">${damageBonus}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">架势:</span>
                            <span class="info-value">${stance}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">升级效果:</span>
                            <span class="info-value">${upgradeEffect}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
